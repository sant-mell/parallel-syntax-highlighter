<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resaltador DFA - review_case.py</title>
    <style>
        :root {
            --fondo: #f6f2e8;
            --panel: #fffdf7;
            --texto: #1f1b16;
            --numero: #005f73;
            --cadena: #8b2e16;
            --identificador: #2a4d14;
            --operador: #a03a00;
            --comentario: #6b7280;
            --error: #b00020;
            --borde: #d8cbb5;
        }

        body {
            margin: 0;
            background: linear-gradient(145deg, #efe8d8 0%, #f8f5ec 55%, #efe2cb 100%);
            color: var(--texto);
            font-family: 'Courier New', Courier, monospace;
        }

        .contenedor {
            max-width: 1000px;
            margin: 28px auto;
            padding: 0 16px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.15rem;
            letter-spacing: 0.4px;
        }

        .codigo {
            background: var(--panel);
            border: 1px solid var(--borde);
            border-radius: 10px;
            padding: 16px;
            overflow-x: auto;
            box-shadow: 0 8px 24px rgba(63, 44, 18, 0.08);
            white-space: pre;
            line-height: 1.45;
            font-size: 14px;
        }

        .numero { color: var(--numero); }
        .cadena { color: var(--cadena); }
        .identificador { color: var(--identificador); }
        .operador { color: var(--operador); font-weight: 700; }
        .comentario { color: var(--comentario); font-style: italic; }
        .error { color: var(--error); background: rgba(176, 0, 32, 0.12); }
    </style>
</head>
<body>
    <main class="contenedor">
        <h1>Resaltado léxico por DFA: review_case.py</h1>
        <div class="codigo"><span class="identificador">a</span> <span class="operador">=</span> <span class="numero">1</span> <span class="comentario"># comentario python</span>
<span class="identificador">b</span> <span class="operador">=</span> <span class="numero">2</span> <span class="operador">/</span><span class="operador">/</span> <span class="identificador">no</span> <span class="identificador">es</span> <span class="identificador">comentario</span> <span class="identificador">python</span>
<span class="identificador">c</span> <span class="operador">=</span> <span class="cadena">&quot;hola # dentro string&quot;</span>
</div>
    </main>
</body>
</html>
